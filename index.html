<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dream Car by Чайтанья</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui; }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 12px 16px;
            color: white;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn {
            background: #ff6600;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover { transform: scale(1.02); background: #ff8833; }
        .btn-off { background: #444; }
        .slider {
            width: 160px;
            cursor: pointer;
        }
        select {
            background: #333;
            color: white;
            border: 1px solid #ff6600;
            border-radius: 20px;
            padding: 5px 10px;
        }
        .group {
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 40px;
        }
        @media (max-width: 700px) {
            #ui { flex-direction: column; align-items: stretch; bottom: 10px; left: 10px; right: 10px; gap: 8px; }
            .group { justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="group">🌞🌙 <span>Время:</span>
            <input type="range" id="timeSlider" min="0" max="24" step="0.1" value="14" class="slider">
            <span id="timeDisplay">14:00</span>
        </div>
        <div class="group">💡 Фары:
            <button id="lightsBtn" class="btn">Выкл</button>
        </div>
        <div class="group">💨 Выхлоп:
            <button id="exhaustBtn" class="btn">Выкл</button>
        </div>
        <div class="group">🎵 Звуки:
            <select id="soundSelect">
                <option value="engine">Рёв двигателя</option>
                <option value="nature">Природа (пение птиц)</option>
                <option value="city">Городской шум</option>
            </select>
            <button id="soundBtn" class="btn">Вкл</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.003);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 2.5, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // Орбита
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0.8, 0);

        // --- ОСВЕЩЕНИЕ (динамическое) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x88aaff, 0.3);
        fillLight.position.set(0, 2, 0);
        scene.add(fillLight);
        
        // Солнце и Луна
        const sunGeometry = new THREE.SphereGeometry(1.2, 64, 64);
        const sunMaterial = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4411, emissiveIntensity: 0.8 });
        const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sunMesh);
        
        const moonGeometry = new THREE.SphereGeometry(0.9, 64, 64);
        const moonMaterial = new THREE.MeshStandardMaterial({ color: 0xdddddd, emissive: 0x88aaff, emissiveIntensity: 0.2 });
        const moonMesh = new THREE.Mesh(moonGeometry, moonMaterial);
        scene.add(moonMesh);
        
        // Фара (прожектор)
        const headlightSpot = new THREE.SpotLight(0xffaa66, 1.2);
        headlightSpot.angle = 0.5;
        headlightSpot.penumbra = 0.3;
        headlightSpot.distance = 15;
        headlightSpot.castShadow = true;
        scene.add(headlightSpot);
        
        // --- ДОРОГА (основная плоскость) ---
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x2c2e3a });
        const roadPlane = new THREE.Mesh(new THREE.PlaneGeometry(4.5, 80), roadMat);
        roadPlane.rotation.x = -Math.PI/2;
        roadPlane.position.y = -0.2;
        roadPlane.receiveShadow = true;
        scene.add(roadPlane);
        
        // Полоски разметки
        const lineMat = new THREE.MeshStandardMaterial({ color: 0xffdd99 });
        const lines = [];
        for (let i = -40; i <= 40; i+=3) {
            const line = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 0.6), lineMat);
            line.position.set(0, -0.15, i);
            line.castShadow = false;
            scene.add(line);
            lines.push(line);
        }
        
        // --- ЛАНДШАФТ: ДВИЖУЩИЕСЯ ОБЪЕКТЫ ---
        // Группа, которая будет смещаться назад
        const landscapeGroup = new THREE.Group();
        scene.add(landscapeGroup);
        
        // Функция генерации объектов только по бокам дороги
        function addScenery() {
            // Деревья
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const crownMat = new THREE.MeshStandardMaterial({ color: 0x5A9E4E });
            for (let i = -35; i <= 35; i+=4) {
                // левая сторона
                const treeLeft = new THREE.Group();
                const trunkL = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1), trunkMat);
                trunkL.position.y = 0;
                const crownL = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.2, 6), crownMat);
                crownL.position.y = 0.8;
                treeLeft.add(trunkL, crownL);
                treeLeft.position.set(-4.5, -0.2, i);
                treeLeft.castShadow = true;
                landscapeGroup.add(treeLeft);
                // правая сторона
                const treeRight = new THREE.Group();
                const trunkR = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1), trunkMat);
                trunkR.position.y = 0;
                const crownR = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.2, 6), crownMat);
                crownR.position.y = 0.8;
                treeRight.add(trunkR, crownR);
                treeRight.position.set(4.5, -0.2, i);
                treeRight.castShadow = true;
                landscapeGroup.add(treeRight);
            }
            // Холмы (только вдали от дороги)
            const hillMat = new THREE.MeshStandardMaterial({ color: 0x6a9e4b });
            for (let i = -30; i <= 30; i+=6) {
                for (let side = -1; side <= 1; side+=2) {
                    const x = side * (5 + Math.random() * 2);
                    if (Math.abs(x) < 3) continue; // не на дороге
                    const hill = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), hillMat);
                    hill.position.set(x, -0.3, i + (Math.random() - 0.5)*4);
                    hill.scale.set(1.5, 0.5, 1.5);
                    hill.castShadow = true;
                    landscapeGroup.add(hill);
                }
            }
            // Камни
            const stoneMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
            for (let i = 0; i < 150; i++) {
                const z = (Math.random() - 0.5) * 80;
                const x = (Math.random() - 0.5) * 12;
                if (Math.abs(x) < 2.5) continue; // не на дороге
                const stone = new THREE.Mesh(new THREE.DodecahedronGeometry(0.15), stoneMat);
                stone.position.set(x, -0.25, z);
                stone.scale.set(1, 0.6, 0.8);
                stone.castShadow = true;
                landscapeGroup.add(stone);
            }
            // Трава (простые кустики)
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x5cad3a });
            for (let i = 0; i < 400; i++) {
                const z = (Math.random() - 0.5) * 90;
                const x = (Math.random() - 0.5) * 12;
                if (Math.abs(x) < 2.8) continue;
                const grass = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.3, 3), grassMat);
                grass.position.set(x, -0.2, z);
                grass.castShadow = false;
                landscapeGroup.add(grass);
            }
        }
        addScenery();
        
        // --- МАШИНКА ---
        const car = new THREE.Group();
        // Кузов
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.55, 2.2), new THREE.MeshStandardMaterial({ color: 0xe34234, metalness: 0.7, roughness: 0.3 }));
        body.position.y = 0.3;
        body.castShadow = true;
        car.add(body);
        // Кабина
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.45, 1.1), new THREE.MeshStandardMaterial({ color: 0x88aaff, metalness: 0.8, transparent: true, opacity: 0.7 }));
        cabin.position.set(0, 0.55, -0.4);
        car.add(cabin);
        // Колёса
        const wheelGeo = new THREE.CylinderGeometry(0.38, 0.38, 0.45, 24);
        const wheelMatCar = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5 });
        const wheels = [];
        [[-0.75, 0.15, 0.85], [0.75, 0.15, 0.85], [-0.75, 0.15, -0.85], [0.75, 0.15, -0.85]].forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMatCar);
            wheel.rotation.z = Math.PI/2;
            wheel.position.set(pos[0], pos[1], pos[2]);
            wheel.castShadow = true;
            car.add(wheel);
            wheels.push(wheel);
        });
        // Фара (передняя)
        const headlightObj = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4422, emissiveIntensity: 0 }));
        headlightObj.position.set(0, 0.25, 1.15);
        car.add(headlightObj);
        // Выхлопная труба
        const exhaustPipe = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.5), new THREE.MeshStandardMaterial({ color: 0xcc8866 }));
        exhaustPipe.position.set(0.8, 0.1, -1.1);
        car.add(exhaustPipe);
        
        // Частицы выхлопа
        const particleCount = 200;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = 0;
            particlePositions[i*3+1] = 0;
            particlePositions[i*3+2] = 0;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.07, transparent: true, opacity: 0.8 });
        const exhaustParticles = new THREE.Points(particleGeometry, particleMaterial);
        car.add(exhaustParticles);
        
        scene.add(car);
        
        // Текст над машиной
        const div = document.createElement('div');
        div.textContent = '🐀 Чайтанья 🚗';
        div.style.cssText = 'color:white; background:rgba(0,0,0,0.6); padding:4px 12px; border-radius:20px; font-weight:bold;';
        const label = new CSS2DObject(div);
        label.position.set(0, 1.0, 0);
        car.add(label);
        
        // Привязываем прожектор к машине
        headlightSpot.position.set(0, 0.4, 1.2);
        car.add(headlightSpot);
        
        // --- ДВИЖЕНИЕ ЛАНДШАФТА И ПОЛОСОК ---
        let scrollOffset = 0;
        const scrollSpeed = 0.12;
        
        function updateScroll() {
            scrollOffset += scrollSpeed;
            // Сдвигаем полоски разметки
            lines.forEach((line, idx) => {
                let z = -40 + idx * 3;
                z += scrollOffset;
                if (z > 40) z -= 80;
                line.position.z = z;
            });
            // Сдвигаем все объекты ландшафта
            landscapeGroup.children.forEach(obj => {
                obj.position.z -= scrollSpeed;
                if (obj.position.z < -45) {
                    obj.position.z += 90;
                    // при пересечении границы можно слегка менять позицию X для разнообразия
                    if (Math.abs(obj.position.x) > 2.5) {
                        // оставляем, но не заезжаем на дорогу
                    }
                }
            });
            requestAnimationFrame(updateScroll);
        }
        updateScroll();
        
        // --- УПРАВЛЕНИЕ ВРЕМЕНЕМ (солнце/луна и освещение) ---
        const timeSlider = document.getElementById('timeSlider');
        const timeDisplay = document.getElementById('timeDisplay');
        let currentHour = 14;
        
        function updateTime(hour) {
            currentHour = hour;
            const h = Math.floor(hour);
            const m = Math.floor((hour % 1) * 60);
            timeDisplay.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
            const angle = (hour / 24) * Math.PI * 2;
            const radius = 18;
            const sunY = Math.sin(angle) * radius;
            const sunX = Math.cos(angle) * radius;
            sunMesh.position.set(sunX, sunY + 2, -8);
            moonMesh.position.set(sunX + (hour < 12 ? 12 : -12), sunY + 1, -6);
            let intensity = Math.max(0, Math.sin(angle)) * 1.2;
            if (intensity < 0.1) intensity = 0.1;
            dirLight.intensity = intensity;
            ambientLight.intensity = 0.3 + intensity * 0.3;
            const skyHue = 0.55 + intensity * 0.2;
            scene.background.setHSL(skyHue, 0.7, 0.1 + intensity * 0.2);
            scene.fog.color.copy(scene.background);
            sunMaterial.emissiveIntensity = Math.max(0, Math.sin(angle)) * 1.5;
            moonMaterial.emissiveIntensity = Math.max(0, -Math.sin(angle)) * 0.5;
        }
        timeSlider.addEventListener('input', (e) => updateTime(parseFloat(e.target.value)));
        updateTime(14);
        
        // --- ФАРЫ ---
        let lightsOn = true;
        const lightsBtn = document.getElementById('lightsBtn');
        lightsBtn.addEventListener('click', () => {
            lightsOn = !lightsOn;
            headlightObj.material.emissiveIntensity = lightsOn ? 0.9 : 0;
            headlightSpot.intensity = lightsOn ? 1.2 : 0;
            lightsBtn.textContent = lightsOn ? 'Выкл' : 'Вкл';
            lightsBtn.style.background = lightsOn ? '#ff6600' : '#444';
        });
        headlightSpot.intensity = 1.2;
        
        // --- ВЫХЛОП ---
        let exhaustOn = false;
        const exhaustBtn = document.getElementById('exhaustBtn');
        exhaustBtn.addEventListener('click', () => {
            exhaustOn = !exhaustOn;
            exhaustBtn.textContent = exhaustOn ? 'Вкл' : 'Выкл';
            exhaustBtn.style.background = exhaustOn ? '#ff6600'' : '#444';
        });
        
        function updateExhaust() {
            if (!exhaustOn) {
                exhaustParticles.visible = false;
                return;
            }
            exhaustParticles.visible = true;
            const positions = exhaustParticles.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                if (Math.random() < 0.3) {
                    positions[i*3] = (Math.random() - 0.5) * 0.4;
                    positions[i*3+1] = Math.random() * 0.3;
                    positions[i*3+2] = -1.2 - Math.random() * 0.5;
                } else {
                    positions[i*3+2] -= 0.05;
                    if (positions[i*3+2] < -2.5) {
                        positions[i*3] = (Math.random() - 0.5) * 0.4;
                        positions[i*3+1] = Math.random() * 0.3;
                        positions[i*3+2] = -1.2;
                    }
                }
            }
            exhaustParticles.geometry.attributes.position.needsUpdate = true;
        }
        
        // --- ЗВУКИ ---
        let audioCtx = null;
        let currentSound = null;
        let isSoundPlaying = false;
        const soundSelect = document.getElementById('soundSelect');
        const soundBtn = document.getElementById('soundBtn');
        
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function loadSound(type) {
            if (currentSound) {
                currentSound.stop();
                currentSound = null;
            }
            if (!audioCtx) initAudio();
            audioCtx.resume();
            let url = '';
            if (type === 'engine') url = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
            else if (type === 'nature') url = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3';
            else if (type === 'city') url = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3';
            fetch(url).then(res => res.arrayBuffer()).then(buf => {
                audioCtx.decodeAudioData(buf, decoded => {
                    const source = audioCtx.createBufferSource();
                    source.buffer = decoded;
                    source.loop = true;
                    source.connect(audioCtx.destination);
                    source.start();
                    currentSound = source;
                    if (!isSoundPlaying) source.stop();
                });
            });
        }
        soundBtn.addEventListener('click', () => {
            if (!audioCtx) initAudio();
            audioCtx.resume();
            if (isSoundPlaying) {
                if (currentSound) currentSound.stop();
                isSoundPlaying = false;
                soundBtn.textContent = 'Вкл';
                soundBtn.style.background = '#444';
            } else {
                loadSound(soundSelect.value);
                isSoundPlaying = true;
                soundBtn.textContent = 'Выкл';
                soundBtn.style.background = '#ff6600';
            }
        });
        
        // --- АНИМАЦИЯ КОЛЁС И ВЫХЛОПА ---
        let wheelAngle = 0;
        function animateCar() {
            requestAnimationFrame(animateCar);
            wheelAngle += 0.12;
            wheels.forEach(w => w.rotation.x = wheelAngle);
            car.position.y = Math.sin(Date.now() * 0.008) * 0.01;
            updateExhaust();
        }
        animateCar();
        
        // --- ОБНОВЛЕНИЕ КАМЕРЫ И РЕНДЕРИНГ ---
        function mainRender() {
            requestAnimationFrame(mainRender);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        mainRender();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✅ Всё работает! Ландшафт движется, камни и холмы — только по бокам.');
    </script>
</body>
</html>
