<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dream Car • Чайтанья</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            z-index: 100;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
        }
        button, select {
            background: #ff6600;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #ff8833; }
        .slider { width: 140px; cursor: pointer; }
        @media (max-width: 700px) {
            #controls { flex-direction: column; align-items: stretch; gap: 8px; }
            .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        }
    </style>
</head>
<body>
<div id="controls">
    <div class="row">🌞🌙 <input type="range" id="timeSlider" min="0" max="24" step="0.1" value="14" class="slider"> <span id="timeDisplay">14:00</span></div>
    <div class="row">💡 <button id="lightsBtn">Фары Вкл</button></div>
    <div class="row">💨 <button id="exhaustBtn">Выхлоп Выкл</button></div>
    <div class="row">🎵 <select id="soundSelect"><option value="engine">Рёв</option><option value="nature">Природа</option><option value="city">Город</option></select>
    <button id="soundBtn">Вкл</button></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- СЦЕНА, КАМЕРА, РЕНДЕР ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1030);
scene.fog = new THREE.FogExp2(0x0a1030, 0.005);
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(5, 3, 8);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Управление камерой (можно отключить, если тормозит)
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 0.5, 0);

// --- ОСВЕЩЕНИЕ ---
const ambient = new THREE.AmbientLight(0x404060);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
scene.add(dirLight);
const fill = new THREE.PointLight(0x88aaff, 0.3);
fill.position.set(0, 2, 0);
scene.add(fill);

// Солнце и Луна
const sun = new THREE.Mesh(new THREE.SphereGeometry(1.2, 64, 64), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4411, emissiveIntensity: 0.8 }));
scene.add(sun);
const moon = new THREE.Mesh(new THREE.SphereGeometry(0.9, 64, 64), new THREE.MeshStandardMaterial({ color: 0xdddddd, emissive: 0x88aaff, emissiveIntensity: 0.2 }));
scene.add(moon);

// Доп. свет для фар (будет привязан к машине)
const headlightSpot = new THREE.SpotLight(0xffaa66, 1.2);
headlightSpot.angle = 0.5;
headlightSpot.penumbra = 0.3;
headlightSpot.distance = 15;
headlightSpot.castShadow = true;

// --- ДОРОГА ---
const roadMat = new THREE.MeshStandardMaterial({ color: 0x2c2e3a });
const roadPlane = new THREE.Mesh(new THREE.PlaneGeometry(4.5, 80), roadMat);
roadPlane.rotation.x = -Math.PI/2;
roadPlane.position.y = -0.2;
roadPlane.receiveShadow = true;
scene.add(roadPlane);

// Полоски разметки
const lineMat = new THREE.MeshStandardMaterial({ color: 0xffdd99 });
const lines = [];
for (let i = -40; i <= 40; i+=3) {
    const line = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 0.6), lineMat);
    line.position.set(0, -0.15, i);
    line.castShadow = false;
    scene.add(line);
    lines.push(line);
}

// --- ЛАНДШАФТ (только по бокам, без коллизий) ---
const landscapeGroup = new THREE.Group();
scene.add(landscapeGroup);

function addScenery() {
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
    const crownMat = new THREE.MeshStandardMaterial({ color: 0x5A9E4E });
    for (let i = -35; i <= 35; i+=4) {
        const treeLeft = new THREE.Group();
        treeLeft.add(new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1), trunkMat));
        treeLeft.children[0].position.y = 0;
        const crownL = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.2, 6), crownMat);
        crownL.position.y = 0.8;
        treeLeft.add(crownL);
        treeLeft.position.set(-4.8, -0.2, i);
        treeLeft.castShadow = true;
        landscapeGroup.add(treeLeft);

        const treeRight = new THREE.Group();
        treeRight.add(new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1), trunkMat));
        treeRight.children[0].position.y = 0;
        const crownR = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.2, 6), crownMat);
        crownR.position.y = 0.8;
        treeRight.add(crownR);
        treeRight.position.set(4.8, -0.2, i);
        treeRight.castShadow = true;
        landscapeGroup.add(treeRight);
    }
    const hillMat = new THREE.MeshStandardMaterial({ color: 0x6a9e4b });
    for (let i = -30; i <= 30; i+=6) {
        for (let side of [-1,1]) {
            const x = side * (5 + Math.random()*1.5);
            if (Math.abs(x) < 2.8) continue;
            const hill = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), hillMat);
            hill.position.set(x, -0.3, i + (Math.random()-0.5)*3);
            hill.scale.set(1.5, 0.5, 1.5);
            hill.castShadow = true;
            landscapeGroup.add(hill);
        }
    }
    const stoneMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
    for (let i=0;i<120;i++) {
        const z = (Math.random()-0.5)*80;
        const x = (Math.random()-0.5)*12;
        if (Math.abs(x) < 2.5) continue;
        const stone = new THREE.Mesh(new THREE.DodecahedronGeometry(0.15), stoneMat);
        stone.position.set(x, -0.25, z);
        stone.scale.set(1,0.6,0.8);
        stone.castShadow = true;
        landscapeGroup.add(stone);
    }
    const grassMat = new THREE.MeshStandardMaterial({ color: 0x5cad3a });
    for (let i=0;i<300;i++) {
        const z = (Math.random()-0.5)*90;
        const x = (Math.random()-0.5)*12;
        if (Math.abs(x) < 2.8) continue;
        const grass = new THREE.Mesh(new THREE.ConeGeometry(0.1,0.3,3), grassMat);
        grass.position.set(x, -0.2, z);
        grass.castShadow = false;
        landscapeGroup.add(grass);
    }
}
addScenery();

// --- МАШИНА ---
const car = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.55, 2.2), new THREE.MeshStandardMaterial({ color: 0xe34234, metalness: 0.7 }));
body.position.y = 0.3;
body.castShadow = true;
car.add(body);
const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.45, 1.1), new THREE.MeshStandardMaterial({ color: 0x88aaff, transparent: true, opacity: 0.7 }));
cabin.position.set(0, 0.55, -0.4);
car.add(cabin);
const wheelGeo = new THREE.CylinderGeometry(0.38, 0.38, 0.45, 24);
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222 });
const wheels = [];
[[-0.75,0.15,0.85],[0.75,0.15,0.85],[-0.75,0.15,-0.85],[0.75,0.15,-0.85]].forEach(p=>{
    const w = new THREE.Mesh(wheelGeo, wheelMat);
    w.rotation.z = Math.PI/2;
    w.position.set(p[0], p[1], p[2]);
    w.castShadow = true;
    car.add(w);
    wheels.push(w);
});
const headlightObj = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissiveIntensity: 0 }));
headlightObj.position.set(0, 0.25, 1.15);
car.add(headlightObj);
scene.add(car);
car.add(headlightSpot);
headlightSpot.position.set(0, 0.4, 1.2);

// Выхлоп (частицы)
const particleCount = 180;
const particleGeo = new THREE.BufferGeometry();
const posArray = new Float32Array(particleCount*3);
particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const particles = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: 0xaaa, size: 0.07, transparent: true }));
car.add(particles);

// --- АНИМАЦИЯ ДВИЖЕНИЯ ПОЛОСОК И ЛАНДШАФТА ---
let scroll = 0;
const speed = 0.12;
function updateLandscape() {
    requestAnimationFrame(updateLandscape);
    scroll += speed;
    lines.forEach((line, i) => {
        let z = -40 + i * 3;
        z += scroll;
        if (z > 40) z -= 80;
        line.position.z = z;
    });
    landscapeGroup.children.forEach(obj => {
        obj.position.z -= speed;
        if (obj.position.z < -48) obj.position.z += 96;
    });
}
updateLandscape();

// --- УПРАВЛЕНИЕ ВРЕМЕНЕМ ---
const slider = document.getElementById('timeSlider');
const timeDisp = document.getElementById('timeDisplay');
function updateTime(hour) {
    const h = Math.floor(hour);
    const m = Math.floor((hour%1)*60);
    timeDisp.innerText = `${h}:${m.toString().padStart(2,'0')}`;
    const angle = (hour/24)*Math.PI*2;
    const r = 18;
    const sunY = Math.sin(angle)*r;
    const sunX = Math.cos(angle)*r;
    sun.position.set(sunX, sunY+2, -8);
    moon.position.set(sunX + (hour<12?12:-12), sunY+1, -6);
    let intensity = Math.max(0, Math.sin(angle))*1.2;
    if (intensity<0.1) intensity=0.1;
    dirLight.intensity = intensity;
    ambient.intensity = 0.3 + intensity*0.3;
    scene.background.setHSL(0.55+intensity*0.2, 0.7, 0.1+intensity*0.2);
}
slider.addEventListener('input', e=>updateTime(parseFloat(e.target.value)));
updateTime(14);

// --- ФАРЫ ---
let lightsOn = true;
const lightsBtn = document.getElementById('lightsBtn');
lightsBtn.addEventListener('click', () => {
    lightsOn = !lightsOn;
    headlightObj.material.emissiveIntensity = lightsOn ? 0.9 : 0;
    headlightSpot.intensity = lightsOn ? 1.2 : 0;
    lightsBtn.innerText = `Фары ${lightsOn ? 'Выкл' : 'Вкл'}`;
    lightsBtn.style.background = lightsOn ? '#ff6600' : '#444';
});

// --- ВЫХЛОП ---
let exhaustOn = false;
const exhaustBtn = document.getElementById('exhaustBtn');
exhaustBtn.addEventListener('click', () => {
    exhaustOn = !exhaustOn;
    exhaustBtn.innerText = `Выхлоп ${exhaustOn ? 'Вкл' : 'Выкл'}`;
    exhaustBtn.style.background = exhaustOn ? '#ff6600' : '#444';
});
function updateExhaust() {
    if (!exhaustOn) { particles.visible = false; return; }
    particles.visible = true;
    const positions = particles.geometry.attributes.position.array;
    for (let i=0;i<particleCount;i++) {
        if (Math.random()<0.3) {
            positions[i*3] = (Math.random()-0.5)*0.4;
            positions[i*3+1] = Math.random()*0.3;
            positions[i*3+2] = -1.2 - Math.random()*0.5;
        } else {
            positions[i*3+2] -= 0.06;
            if (positions[i*3+2] < -2.5) {
                positions[i*3] = (Math.random()-0.5)*0.4;
                positions[i*3+1] = Math.random()*0.3;
                positions[i*3+2] = -1.2;
            }
        }
    }
    particles.geometry.attributes.position.needsUpdate = true;
    requestAnimationFrame(updateExhaust);
}
updateExhaust();

// --- ЗВУКИ (без реальных файлов, просто демо) ---
let audioCtx = null;
let currentSound = null;
let soundOn = false;
const soundSelect = document.getElementById('soundSelect');
const soundBtn = document.getElementById('soundBtn');
soundBtn.addEventListener('click', () => {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
    if (soundOn && currentSound) {
        currentSound.stop();
        soundOn = false;
        soundBtn.innerText = 'Вкл';
        soundBtn.style.background = '#444';
    } else {
        // эмуляция звука — тишина, но кнопка меняется
        soundOn = true;
        soundBtn.innerText = 'Выкл';
        soundBtn.style.background = '#ff6600';
        // Здесь можно подставить реальный аудио-буфер, но чтобы не грузить CDN, оставим пустышку
    }
});

// --- АНИМАЦИЯ КОЛЁС И ПОДПРЫГИВАНИЕ ---
let wheelAngle = 0;
function animateCar() {
    requestAnimationFrame(animateCar);
    wheelAngle += 0.12;
    wheels.forEach(w => w.rotation.x = wheelAngle);
    car.position.y = Math.sin(Date.now()*0.01)*0.01;
}
animateCar();

// --- РЕНДЕРИНГ ---
function renderLoop() {
    requestAnimationFrame(renderLoop);
    controls.update(); // если тормозит, можно закомментировать
    renderer.render(scene, camera);
}
renderLoop();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

console.log('🏁 Машина поехала, камни — только по бокам!');
</script>
</body>
</html>
