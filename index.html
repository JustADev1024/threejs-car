<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Бесконечная машинка Чайтаньи</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
        }
        #music-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            z-index: 20;
            font-weight: bold;
            backdrop-filter: blur(5px);
            transition: transform 0.2s;
        }
        #music-btn:hover {
            transform: scale(1.05);
            background: #ff6600;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; top: 10px; left: 10px; }
            #music-btn { padding: 8px 16px; font-size: 14px; bottom: 15px; right: 15px; }
        }
    </style>
</head>
<body>
    <div id="info">
        🚗 Бесконечная машинка | 🐀 Шура и Дуня рулят | 🌟 Крути камеру мышкой/пальцем
    </div>
    <button id="music-btn">🎵 Включить музыку</button>

    <!-- Подключаем Three.js и дополнения -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- ИНИЦИАЛИЗАЦИЯ СЦЕНЫ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030); // ночное небо
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008); // лёгкий туман

        // Камера (вид от третьего лица)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);
        camera.lookAt(0, 0, 0);

        // Рендереры
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // включили тени для красоты
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // CSS2D рендерер для текста над машинкой
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- УПРАВЛЕНИЕ КАМЕРОЙ (можно крутить) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.0;
        controls.target.set(0, 0.5, 0);

        // --- ОСВЕЩЕНИЕ ---
        // Ambient light
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        // Главный направленный свет
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);
        // Задний тёплый свет
        const backLight = new THREE.PointLight(0xffaa66, 0.5);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        // Подсветка снизу
        const fillLight = new THREE.PointLight(0x88aaff, 0.3);
        fillLight.position.set(0, -1, 0);
        scene.add(fillLight);

        // --- ДОРОГА (движущаяся лента) ---
        const roadLength = 40;
        const roadWidth = 4;
        const roadGeometry = new THREE.PlaneGeometry(roadWidth, roadLength);
        const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x2c2e3a, roughness: 0.7, metalness: 0.1 });
        const road = new THREE.Mesh(roadGeometry, roadMaterial);
        road.rotation.x = -Math.PI / 2;
        road.position.y = -0.2;
        road.receiveShadow = true;
        scene.add(road);

        // Разметка дороги (полоски)
        const lineMaterial = new THREE.MeshStandardMaterial({ color: 0xffdd99 });
        const lineCount = 20;
        const lines = [];
        for (let i = 0; i < lineCount; i++) {
            const lineGeo = new THREE.BoxGeometry(0.2, 0.05, 0.8);
            const line = new THREE.Mesh(lineGeo, lineMaterial);
            line.position.x = 0;
            line.position.z = -roadLength/2 + i * (roadLength / lineCount);
            line.position.y = -0.15;
            line.castShadow = false;
            scene.add(line);
            lines.push(line);
        }

        // Обочина (декоративные полосы)
        const edgeMat = new THREE.MeshStandardMaterial({ color: 0xaa9966 });
        const leftEdge = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, roadLength), edgeMat);
        leftEdge.position.set(-roadWidth/2 - 0.2, -0.2, 0);
        leftEdge.receiveShadow = true;
        scene.add(leftEdge);
        const rightEdge = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, roadLength), edgeMat);
        rightEdge.position.set(roadWidth/2 + 0.2, -0.2, 0);
        rightEdge.receiveShadow = true;
        scene.add(rightEdge);

        // --- МАШИНКА (из примитивов) ---
        const carGroup = new THREE.Group();
        
        // Кузов
        const bodyGeo = new THREE.BoxGeometry(1.2, 0.5, 2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe34234, metalness: 0.6, roughness: 0.3 }); // красный
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        body.position.y = 0.25;
        carGroup.add(body);
        
        // Кабина (прозрачная)
        const cabinGeo = new THREE.BoxGeometry(0.9, 0.4, 1);
        const cabinMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, metalness: 0.9, roughness: 0.2, transparent: true, opacity: 0.7 });
        const cabin = new THREE.Mesh(cabinGeo, cabinMat);
        cabin.position.set(0, 0.45, -0.3);
        cabin.castShadow = true;
        carGroup.add(cabin);
        
        // Колёса
        const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.4, 24);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.4 });
        
        const positions = [[-0.7, 0.1, 0.7], [0.7, 0.1, 0.7], [-0.7, 0.1, -0.7], [0.7, 0.1, -0.7]];
        const wheels = [];
        positions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(pos[0], pos[1], pos[2]);
            wheel.castShadow = true;
            carGroup.add(wheel);
            wheels.push(wheel);
        });
        
        // Фары
        const lightMat = new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0xff4400, emissiveIntensity: 0.5 });
        const headlight = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), lightMat);
        headlight.position.set(0, 0.2, 1.05);
        carGroup.add(headlight);
        
        carGroup.position.y = 0;
        carGroup.castShadow = true;
        scene.add(carGroup);

        // Текст над машинкой
        const div = document.createElement('div');
        div.textContent = '🚗 Чайтанья мчит! 🐀';
        div.style.color = '#fff';
        div.style.fontSize = '20px';
        div.style.fontWeight = 'bold';
        div.style.textShadow = '1px 1px 2px black';
        div.style.backgroundColor = 'rgba(0,0,0,0.5)';
        div.style.padding = '4px 12px';
        div.style.borderRadius = '20px';
        div.style.whiteSpace = 'nowrap';
        const labelObj = new CSS2DObject(div);
        labelObj.position.set(0, 0.9, 0);
        carGroup.add(labelObj);

        // --- ОКРУЖЕНИЕ: деревья и столбы ---
        const treeMatTrunk = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
        const treeMatCrown = new THREE.MeshStandardMaterial({ color: 0x5A9E4E });
        const trees = [];
        for (let i = -15; i <= 15; i+=4) {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1, 6), treeMatTrunk);
            trunk.position.set(-5, -0.3, i);
            trunk.castShadow = true;
            const crown = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1, 8), treeMatCrown);
            crown.position.set(-5, 0.4, i);
            crown.castShadow = true;
            scene.add(trunk);
            scene.add(crown);
            
            const trunk2 = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1, 6), treeMatTrunk);
            trunk2.position.set(5, -0.3, i);
            trunk2.castShadow = true;
            const crown2 = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1, 8), treeMatCrown);
            crown2.position.set(5, 0.4, i);
            crown2.castShadow = true;
            scene.add(trunk2);
            scene.add(crown2);
            
            trees.push(trunk, crown, trunk2, crown2);
        }
        
        // Звёзды на небе
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 800;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 50 + 15;
            starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // --- АНИМАЦИЯ ДВИЖЕНИЯ (бесконечная дорога) ---
        let offset = 0;
        const speed = 0.08; // скорость движения
        
        // Переменные для музыки
        let audio = null;
        let isMusicPlaying = false;
        const musicBtn = document.getElementById('music-btn');
        
        // Создаём аудио с хорошим треком (лицензия Creative Commons)
        function initAudio() {
            audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3');
            audio.loop = true;
            audio.volume = 0.6;
            // Эта ссылка на тестовый трек, можно заменить на свой
            audio.addEventListener('canplaythrough', () => {});
        }
        
        function startMusic() {
            if (!audio) {
                initAudio();
            }
            if (audio && !isMusicPlaying) {
                audio.play().then(() => {
                    isMusicPlaying = true;
                    musicBtn.textContent = '🎵 Музыка играет';
                    musicBtn.style.background = '#ff6600';
                }).catch(e => {
                    console.log('Автозапуск заблокирован, но по кнопке должно работать');
                    isMusicPlaying = false;
                });
            }
        }
        
        musicBtn.addEventListener('click', () => {
            if (!audio) initAudio();
            if (audio && !isMusicPlaying) {
                audio.play();
                isMusicPlaying = true;
                musicBtn.textContent = '🎵 Музыка играет';
                musicBtn.style.background = '#ff6600';
            } else if (audio && isMusicPlaying) {
                audio.pause();
                isMusicPlaying = false;
                musicBtn.textContent = '🎵 Включить музыку';
                musicBtn.style.background = 'rgba(0,0,0,0.7)';
            }
        });
        
        // Анимация колёс
        let wheelRotation = 0;
        
        // Анимация
        function animate() {
            requestAnimationFrame(animate);
            
            // Движение полосок разметки и деревьев (имитация бесконечной дороги)
            offset += speed;
            if (offset > roadLength) offset -= roadLength;
            
            lines.forEach((line, idx) => {
                let z = -roadLength/2 + idx * (roadLength / lineCount);
                z += offset;
                if (z > roadLength/2) z -= roadLength;
                line.position.z = z;
            });
            
            // Сдвигаем деревья для иллюзии движения (если не хотим, можно оставить статичными)
            // Но проще сделать, что машина стоит, а мир движется. В нашем случае камера смотрит на машину, поэтому смещаем окружение?
            // Лучше: оставим всё статичным, а машинку немного покачиваем и крутим колеса.
            // Так как у нас есть управление камерой, лучше не двигать окружение, а просто создать ощущение скорости через вращение колёс и вибрацию.
            
            // Вращаем колёса
            wheelRotation += speed * 2;
            wheels.forEach(wheel => {
                wheel.rotation.x = wheelRotation;
            });
            
            // Маленькая вибрация кузова (эффект движения)
            carGroup.position.y = 0 + Math.sin(Date.now() * 0.01) * 0.02;
            
            // Лёгкое вращение руля не нужно, просто блеск фар
            const intensity = 0.5 + Math.sin(Date.now() * 0.008) * 0.2;
            headlight.material.emissiveIntensity = intensity;
            
            // Обновляем камеру (controls)
            controls.update();
            
            // Рендеринг
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        // Запуск анимации
        animate();
        
        // Обработка размера окна
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Небольшая инструкция в консоль
        console.log('🚗 Симулятор машинки запущен! Крути камеру и наслаждайся музыкой.');
    </script>
</body>
  </html>
