<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dream Car • Чайтанья</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
            max-height: 40%;
            overflow-y: auto;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        button, select, input {
            background: #ff6600;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
        }
        button:hover { background: #ff8833; }
        input, select {
            background: #2a2a2a;
            cursor: text;
            color: white;
            border: 1px solid #ff6600;
        }
        select { cursor: pointer; background: #ff6600; color: white; }
        .slider { width: 130px; cursor: pointer; background: #ff6600; }
        #timeDisplay {
            background: black;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: bold;
            mix-blend-mode: difference;
        }
        @media (max-width: 700px) {
            .row { flex-wrap: wrap; justify-content: stretch; }
            button, select, input, .slider { flex: 1; min-width: 80px; }
        }
    </style>
</head>
<body>
<div id="controls">
    <!-- Время суток -->
    <div class="row">
        <span>🌞🌙</span>
        <input type="range" id="timeSlider" min="0" max="24" step="0.1" value="14" class="slider">
        <span id="timeDisplay">14:00</span>
    </div>
    <!-- Фары и выхлоп -->
    <div class="row">
        <button id="lightsBtn">💡 Фары Выкл</button>
        <button id="exhaustBtn">💨 Выхлоп Выкл</button>
    </div>
    <!-- Музыка: выбор предустановленных треков -->
<div class="row">
    <span>🎵 Трек:</span>
    <select id="trackSelect">
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">🎵 Трек 1</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">🎵 Трек 2</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">🎵 Трек 3</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3">🎵 Трек 4</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3">🎵 Трек 5</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3">🎵 Трек 6</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3">🎵 Трек 7</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3">🎵 Трек 8</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3">🎵 Трек 9</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3">🎵 Трек 10</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-11.mp3">🎵 Трек 11</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-12.mp3">🎵 Трек 12</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-13.mp3">🎵 Трек 13</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-14.mp3">🎵 Трек 14</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3">🎵 Трек 15</option>
        <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3">🎵 Трек 16</option>
    </select>
    <button id="musicBtn">🎵 Вкл</button>
</div>
<div class="row">
    <input type="text" id="customUrl" placeholder="➕ Вставьте ссылку на MP3 (например, с Newgrounds)" style="flex:2;">
    <button id="addTrackBtn">➕ Добавить</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- СЦЕНА, КАМЕРА, РЕНДЕР ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1030);
scene.fog = new THREE.FogExp2(0x0a1030, 0.005);
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(5, 3.5, 9);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 0.5, 0);

// --- ОСВЕЩЕНИЕ ---
const ambientLight = new THREE.AmbientLight(0x404060);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
scene.add(dirLight);
const fillLight = new THREE.PointLight(0x88aaff, 0.3);
fillLight.position.set(0, 2, 0);
scene.add(fillLight);

// Солнце и луна
const sunMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4411, emissiveIntensity: 0 });
const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(1.2, 64, 64), sunMat);
scene.add(sunMesh);
const moonMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, emissive: 0x88aaff, emissiveIntensity: 0 });
const moonMesh = new THREE.Mesh(new THREE.SphereGeometry(0.9, 64, 64), moonMat);
scene.add(moonMesh);

// --- ФАРЫ ---
const headlightSpot = new THREE.SpotLight(0xffaa66, 0);
headlightSpot.angle = 0.6;
headlightSpot.penumbra = 0.2;
headlightSpot.distance = 20;
headlightSpot.castShadow = true;
const headlightPoint = new THREE.PointLight(0xffaa66, 0, 15);
headlightPoint.castShadow = true;

// --- ТРАВА ---
const grassPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 120),
    new THREE.MeshStandardMaterial({ color: 0x5c9e3a, roughness: 0.9, metalness: 0.1 })
);
grassPlane.rotation.x = -Math.PI / 2;
grassPlane.position.y = -0.3;
grassPlane.receiveShadow = true;
scene.add(grassPlane);

// --- ДОРОГА ---
const roadPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(4.5, 80),
    new THREE.MeshStandardMaterial({ color: 0x2c2e3a, roughness: 0.6 })
);
roadPlane.rotation.x = -Math.PI/2;
roadPlane.position.y = -0.2;
roadPlane.receiveShadow = true;
scene.add(roadPlane);

// --- БОРДЮРЫ ---
const curbMat = new THREE.MeshStandardMaterial({ color: 0xaa9966 });
const curbLeft = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 80), curbMat);
curbLeft.position.set(-2.35, -0.15, 0);
curbLeft.receiveShadow = true;
scene.add(curbLeft);
const curbRight = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 80), curbMat);
curbRight.position.set(2.35, -0.15, 0);
curbRight.receiveShadow = true;
scene.add(curbRight);

// --- ПОЛОСКИ РАЗМЕТКИ (БЕСКОНЕЧНЫЕ) ---
const lineMat = new THREE.MeshStandardMaterial({ color: 0xffdd99 });
const lines = [];
const lineCount = 27;
for (let i = 0; i < lineCount; i++) {
    const line = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 0.6), lineMat);
    line.position.set(0, -0.15, -40 + i * 3);
    line.castShadow = false;
    scene.add(line);
    lines.push(line);
}

// --- ЛАНДШАФТ ---
const landscapeGroup = new THREE.Group();
scene.add(landscapeGroup);

function addScenery() {
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
    const crownMat = new THREE.MeshStandardMaterial({ color: 0x5A9E4E });
    for (let i = -35; i <= 35; i+=4) {
        const leftGroup = new THREE.Group();
        const trunkL = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1), trunkMat);
        trunkL.position.y = 0.5;
        trunkL.castShadow = true;
        const crownL = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.2, 6), crownMat);
        crownL.position.y = 1.1;
        crownL.castShadow = true;
        leftGroup.add(trunkL, crownL);
        leftGroup.position.set(-4.8, -0.25, i);
        landscapeGroup.add(leftGroup);
        const rightGroup = new THREE.Group();
        const trunkR = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1), trunkMat);
        trunkR.position.y = 0.5;
        trunkR.castShadow = true;
        const crownR = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.2, 6), crownMat);
        crownR.position.y = 1.1;
        crownR.castShadow = true;
        rightGroup.add(trunkR, crownR);
        rightGroup.position.set(4.8, -0.25, i);
        landscapeGroup.add(rightGroup);
    }
    const hillMat = new THREE.MeshStandardMaterial({ color: 0x6a9e4b });
    for (let i = -30; i <= 30; i+=6) {
        for (let side of [-1,1]) {
            const x = side * (5 + Math.random()*1.5);
            if (Math.abs(x) < 2.8) continue;
            const hill = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), hillMat);
            hill.position.set(x, -0.35, i + (Math.random()-0.5)*3);
            hill.scale.set(1.5, 0.5, 1.5);
            hill.castShadow = true;
            landscapeGroup.add(hill);
        }
    }
    const stoneMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
    for (let i=0;i<140;i++) {
        const z = (Math.random()-0.5)*80;
        const x = (Math.random()-0.5)*12;
        if (Math.abs(x) < 2.5) continue;
        const stone = new THREE.Mesh(new THREE.DodecahedronGeometry(0.15), stoneMat);
        stone.position.set(x, -0.3, z);
        stone.scale.set(1,0.6,0.8);
        stone.castShadow = true;
        landscapeGroup.add(stone);
    }
    const grassMat2 = new THREE.MeshStandardMaterial({ color: 0x5cad3a });
    for (let i=0;i<400;i++) {
        const z = (Math.random()-0.5)*90;
        const x = (Math.random()-0.5)*12;
        if (Math.abs(x) < 2.8) continue;
        const grass = new THREE.Mesh(new THREE.ConeGeometry(0.1,0.3,3), grassMat2);
        grass.position.set(x, -0.25, z);
        grass.castShadow = false;
        landscapeGroup.add(grass);
    }
}
addScenery();

// --- МАШИНКА ---
const car = new THREE.Group();
const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe34234, metalness: 0.7 });
const body = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.55, 2.2), bodyMat);
body.position.y = 0.3;
body.castShadow = true;
car.add(body);
const cabinMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, transparent: true, opacity: 0.7 });
const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.45, 1.1), cabinMat);
cabin.position.set(0, 0.55, -0.4);
car.add(cabin);
const wheelGeo = new THREE.CylinderGeometry(0.38, 0.38, 0.45, 24);
const wheelMatCar = new THREE.MeshStandardMaterial({ color: 0x222222 });
const wheels = [];
[[-0.75,0.15,0.85],[0.75,0.15,0.85],[-0.75,0.15,-0.85],[0.75,0.15,-0.85]].forEach(p => {
    const w = new THREE.Mesh(wheelGeo, wheelMatCar);
    w.rotation.z = Math.PI/2;
    w.position.set(p[0], p[1], p[2]);
    w.castShadow = true;
    car.add(w);
    wheels.push(w);
});
const headlightModel = new THREE.Mesh(new THREE.SphereGeometry(0.22, 32, 32), new THREE.MeshStandardMaterial({
    color: 0xffaa66,
    emissive: 0xff4422,
    emissiveIntensity: 0
}));
headlightModel.position.set(0, 0.25, 1.15);
car.add(headlightModel);
car.add(headlightSpot);
headlightSpot.position.set(0, 0.3, 1.3);
car.add(headlightPoint);
headlightPoint.position.set(0, 0.3, 1.2);
scene.add(car);

// --- ВЫХЛОП (частицы) ---
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const posArray = new Float32Array(particleCount*3);
particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const particleMat = new THREE.PointsMaterial({ color: 0xccccaa, size: 0.08, transparent: true });
const particles = new THREE.Points(particleGeo, particleMat);
car.add(particles);
let exhaustOn = false;

// --- БЕСКОНЕЧНОЕ ДВИЖЕНИЕ ---
const speed = 0.12;
const roadLength = 80;

function updateScenery() {
    requestAnimationFrame(updateScenery);
    lines.forEach(line => {
        line.position.z -= speed;
        if (line.position.z < -40) line.position.z += roadLength;
    });
    landscapeGroup.children.forEach(obj => {
        obj.position.z -= speed;
        if (obj.position.z < -48) obj.position.z += roadLength + 16;
    });
}
updateScenery();

// --- ВРЕМЯ СУТОК ---
const timeSlider = document.getElementById('timeSlider');
const timeDisplay = document.getElementById('timeDisplay');
function updateTime(hour) {
    const h = Math.floor(hour);
    const m = Math.floor((hour % 1) * 60);
    timeDisplay.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
    const angle = (hour / 12) * Math.PI;
    const radius = 18;
    const sunY = Math.sin(angle) * radius;
    const sunX = Math.cos(angle) * radius;
    const sunVisible = Math.sin(angle) > 0;
    const moonVisible = Math.sin(angle) < 0;
    sunMesh.visible = sunVisible;
    moonMesh.visible = moonVisible;
    if (sunVisible) {
        sunMesh.position.set(sunX, sunY + 2, -8);
        sunMesh.material.emissiveIntensity = Math.sin(angle) * 1.5;
    }
    if (moonVisible) {
        moonMesh.position.set(-sunX, sunY + 1, -6);
        moonMesh.material.emissiveIntensity = -Math.sin(angle) * 0.5;
    }
    let intensity = (1 - Math.cos(angle)) / 2;
    intensity = Math.max(0.1, intensity * 1.2);
    dirLight.intensity = intensity;
    ambientLight.intensity = 0.3 + intensity * 0.3;
    const nightColor = new THREE.Color(0x0a1030);
    const dayColor = new THREE.Color(0x87CEEB);
    const skyColor = nightColor.clone().lerp(dayColor, intensity);
    scene.background = skyColor;
    scene.fog.color = skyColor;
}
timeSlider.addEventListener('input', e => updateTime(parseFloat(e.target.value)));
updateTime(14);

// --- ФАРЫ ---
let lightsOn = true;
const lightsBtn = document.getElementById('lightsBtn');
lightsBtn.addEventListener('click', () => {
    lightsOn = !lightsOn;
    headlightModel.material.emissiveIntensity = lightsOn ? 1.2 : 0;
    headlightSpot.intensity = lightsOn ? 1.5 : 0;
    headlightPoint.intensity = lightsOn ? 0.8 : 0;
    lightsBtn.textContent = lightsOn ? "Фары Выкл" : "Фары Вкл";
    lightsBtn.style.background = lightsOn ? '#ff6600' : '#444';
});
headlightSpot.intensity = 1.5;
headlightPoint.intensity = 0.8;

// --- ВЫХЛОП ---
const exhaustBtn = document.getElementById('exhaustBtn');
exhaustBtn.addEventListener('click', () => {
    exhaustOn = !exhaustOn;
    exhaustBtn.textContent = exhaustOn ? "Выхлоп Вкл" : "Выхлоп Выкл";
    exhaustBtn.style.background = exhaustOn ? '#ff6600' : '#444';
});
function updateExhaust() {
    if (!exhaustOn) { particles.visible = false; requestAnimationFrame(updateExhaust); return; }
    particles.visible = true;
    const positions = particles.geometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        if (Math.random() < 0.3) {
            positions[i*3] = (Math.random() - 0.5) * 0.4;
            positions[i*3+1] = Math.random() * 0.3;
            positions[i*3+2] = -1.2 - Math.random() * 0.5;
        } else {
            positions[i*3+2] -= 0.07;
            if (positions[i*3+2] < -2.5) {
                positions[i*3] = (Math.random() - 0.5) * 0.4;
                positions[i*3+1] = Math.random() * 0.3;
                positions[i*3+2] = -1.2;
            }
        }
    }
    particles.geometry.attributes.position.needsUpdate = true;
    requestAnimationFrame(updateExhaust);
}
updateExhaust();

// --- МУЗЫКА (старый выбор + добавление ссылок) ---
let currentAudio = null;
let musicPlaying = false;
const trackSelect = document.getElementById('trackSelect');
const musicBtn = document.getElementById('musicBtn');
const customUrlInput = document.getElementById('customUrl');
const addTrackBtn = document.getElementById('addTrackBtn');

function playTrack(url) {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
    }
    currentAudio = new Audio(url);
    currentAudio.loop = true;
    currentAudio.volume = 0.5;
    currentAudio.play().then(() => {
        musicPlaying = true;
        musicBtn.textContent = '🔇 Выкл';
        musicBtn.style.background = '#444';
    }).catch(e => {
        console.error('Ошибка воспроизведения:', e);
        musicPlaying = false;
        currentAudio = null;
        alert('Не удалось воспроизвести трек. Проверьте ссылку (должна быть прямой на .mp3) и доступность CORS.');
    });
}

function stopMusic() {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
    }
    musicPlaying = false;
    musicBtn.textContent = '🎵 Вкл';
    musicBtn.style.background = '#ff6600';
}

function toggleMusic() {
    if (musicPlaying) {
        stopMusic();
    } else {
        const selectedUrl = trackSelect.value;
        if (!selectedUrl) {
            alert('Нет доступных треков. Добавьте свою MP3-ссылку.');
            return;
        }
        playTrack(selectedUrl);
    }
}

// Добавление своей ссылки в выпадающий список
function addCustomTrack() {
    let url = customUrlInput.value.trim();
    if (!url) {
        alert('Введите ссылку на MP3 файл');
        return;
    }
    // простая валидация (должна содержать .mp3)
    if (!url.match(/\.mp3($|\?)/i)) {
        alert('Ссылка должна вести напрямую на MP3 файл (обычно заканчивается на .mp3)');
        return;
    }
    // Добавляем новый option
    const option = document.createElement('option');
    option.value = url;
    option.textContent = `Свой трек: ${url.substring(0, 40)}${url.length>40 ? '…' : ''}`;
    trackSelect.appendChild(option);
    trackSelect.value = url; // автоматически выбираем добавленный трек
    customUrlInput.value = '';
    // Если музыка была включена, останавливаем и перезапускаем новый трек
    if (musicPlaying) {
        stopMusic();
        playTrack(url);
    } else {
        // просто готово
        alert('Трек добавлен в список. Выберите его и нажмите "Вкл".');
    }
}

musicBtn.addEventListener('click', toggleMusic);
addTrackBtn.addEventListener('click', addCustomTrack);

// При смене выбранного трека в селекте, если музыка играла, переключаем
trackSelect.addEventListener('change', () => {
    if (musicPlaying) {
        const newUrl = trackSelect.value;
        if (newUrl) {
            stopMusic();
            playTrack(newUrl);
        } else {
            stopMusic();
        }
    }
});

// --- АНИМАЦИЯ КОЛЁС ---
let wheelAngle = 0;
function animateCar() {
    requestAnimationFrame(animateCar);
    wheelAngle += 0.12;
    wheels.forEach(w => w.rotation.x = wheelAngle);
    car.position.y = Math.sin(Date.now() * 0.01) * 0.01;
}
animateCar();

// --- РЕНДЕРИНГ ---
function renderLoop() {
    requestAnimationFrame(renderLoop);
    controls.update();
    renderer.render(scene, camera);
}
renderLoop();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
